services:
  ms_logistic_db:
    image: postgis/postgis:16-3.4
    container_name: ms_logistic_db
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    env_file:
      - .env
    ports:
      - "5090:5432"
    volumes:
      - ms_logistic_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - internal

  ms_logistic_api:
    container_name: ms_logistic_api
    build:
        context: .
        dockerfile: src/MsLogistic.WebApi/Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ConnectionStrings__DefaultConnection: Host=ms_logistic_db;Port=5432;Database=${DB_NAME};Username=${DB_USER};Password=${DB_PASSWORD}
      RabbitMQ__Host: rabbitmq
      RabbitMQ__Port: 5672
      RabbitMQ__UserName: ${RABBITMQ_USER}
      RabbitMQ__Password: ${RABBITMQ_PASSWORD}
      RabbitMQ__VirtualHost: /
      RabbitMQ__DeadLetterExchange: dead-letter-exchange
      RabbitMQ__MaxRetryCount: 3
      RabbitMQ__ReconnectDelaySeconds: 5
      RabbitMQ__MaxReconnectAttempts: 0
      Jwt__Issuer: ${JWT_ISSUER}
      Jwt__Audience: ${JWT_AUDIENCE}
      Jwt__Secret: ${JWT_SECRET}
      Cloudinary__CloudName: ${CLOUDINARY_CLOUD_NAME}
      Cloudinary__ApiKey: ${CLOUDINARY_API_KEY}
      Cloudinary__ApiSecret: ${CLOUDINARY_API_SECRET}
      GoogleMaps__ApiKey: ${GOOGLE_MAPS_API_KEY}
      Telemetry__ServiceName: ms-logistic
      Telemetry__OtlpEndpoint: ${OTLP_ENDPOINT}
      Seq__Url: ${SEQ_URL}
    env_file:
      - .env
    ports:
      - "80:8080"
    depends_on:
      ms_logistic_db:
        condition: service_healthy
    networks:
      - internal

  ms_logistic_worker:
    image: joselct/ms_logistic_worker:1.0.1
    container_name: ms_logistic_worker
    environment:
      ConnectionStrings__DefaultConnection: Host=ms_logistic_db;Port=5432;Database=${DB_NAME};Username=${DB_USER};Password=${DB_PASSWORD}
      RabbitMQ__Host: rabbitmq
      RabbitMQ__Port: 5672
      RabbitMQ__UserName: ${RABBITMQ_USER}
      RabbitMQ__Password: ${RABBITMQ_PASSWORD}
      RabbitMQ__VirtualHost: /
      RabbitMQ__DeadLetterExchange: dead-letter-exchange
      RabbitMQ__MaxRetryCount: 3
      RabbitMQ__ReconnectDelaySeconds: 5
      RabbitMQ__MaxReconnectAttempts: 0
      Outbox__PollingInterval: "00:00:10"
      Outbox__BatchSize: 20
      Outbox__MaxRetries: 5
      Telemetry__ServiceName: ms-logistic-worker
      Telemetry__OtlpEndpoint: ${OTLP_ENDPOINT}
      Seq__Url: ${SEQ_URL}
    env_file:
      - .env
    depends_on:
      ms_logistic_db:
        condition: service_healthy
    networks:
      - internal

  loki:
    image: grafana/loki:3.0.0
    container_name: loki
    restart: unless-stopped
    command: -config.file=/etc/loki/local-config.yaml
    ports:
      - "3100:3100"
    volumes:
      - ../loki/data:/loki
      - ../loki/config.yaml:/etc/loki/local-config.yml
    networks:
      - internal

  prometheus:
    image: prom/prometheus:v2.52.0
    container_name: prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus:/etc/prometheus
      - ../prometheus/data:/prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.retention.time=30d
    networks:
      - internal

  grafana:
    image: grafana/grafana:11.1.0
    container_name: grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
    volumes:
      - ./grafana/data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning
    networks:
      - internal

volumes:
  ms_logistic_db_data:

networks:
    internal:
      driver: bridge
