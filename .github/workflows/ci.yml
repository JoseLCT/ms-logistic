name: CI

on:
  pull_request:
    branches: ["main", "dev"]
  pull_request_review:
    types: [ submitted ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.sha || github.sha }}

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: "zulu"

      - name: Cache SonarQube Cloud packages
        uses: actions/cache@v4
        with:
          path: ~/sonar/cache
          key: ${{ runner.os }}-sonar
          restore-keys: ${{ runner.os }}-sonar

      - name: Cache SonarQube Cloud scanner
        id: cache-sonar-scanner
        uses: actions/cache@v4
        with:
          path: ${{ runner.temp }}/scanner
          key: ${{ runner.os }}-sonar-scanner
          restore-keys: ${{ runner.os }}-sonar-scanner

      - name: Install SonarQube Cloud scanner
        if: steps.cache-sonar-scanner.outputs.cache-hit != 'true'
        run: |
          dotnet tool install dotnet-sonarscanner --create-manifest-if-needed

      - name: Sonarcloud start
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: >
          dotnet sonarscanner begin
          /k:"JoseLCT_ms-logistic"
          /o:"joselct"
          /d:sonar.token="$SONAR_TOKEN"
          /d:sonar.cs.opencover.reportsPaths="coverage/**/coverage.opencover.xml"
          /d:sonar.coverage.exclusions="**/Program.cs,**/Migrations/**,**/*Dto.cs,**/*Dtos/**,**/appsettings*.json,**/*.csproj,**/MsLogistic.UnitTest/**"
          /d:sonar.qualitygate.wait=true

      - name: Restore dependencies
        run: dotnet restore

      - name: Restore dotnet tools
        run: dotnet tool restore

      - name: Build
        run: dotnet build --no-restore

      - name: Test
        run: >
          dotnet test src/MsLogistic.UnitTest/MsLogistic.UnitTest.csproj
          --no-build
          --verbosity normal
          --collect:"XPlat Code Coverage"
          --settings coverlet.runsettings
          --results-directory ./coverage
          --
          DataCollectionRunSettings.DataCollectors.DataCollector.Configuration.Format=opencover,cobertura

      - name: Sonarcloud end
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: >
          dotnet sonarscanner end
          /d:sonar.token="$SONAR_TOKEN"

      - name: Generate coverage report
        run: >
          dotnet tool run reportgenerator
          -reports:"./coverage/**/coverage.cobertura.xml"
          -targetdir:"./coverage/report"
          -reporttypes:Html

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: ./coverage/report
          retention-days: 7
